services:
  # ===========================================
  # Redis - State cache for bridge
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: zephyr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # PostgreSQL - Persistence for bridge + engine
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: zephyr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: zephyr
      POSTGRES_PASSWORD: zephyr
      POSTGRES_DB: zephyr
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zephyr"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Anvil - Local EVM chain
  # ===========================================
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: zephyr-anvil
    ports:
      - "8545:8545"
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
      - "--accounts"
      - "20"
      - "--balance"
      - "10000"
      - "--mnemonic"
      - "${EVM_DEV_MNEMONIC:-test test test test test test test test test test test junk}"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
