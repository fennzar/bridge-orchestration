# ===========================================
# Zephyr Bridge Stack - Base Infrastructure
# ===========================================
# Shared services for all environments (dev, testnet, prod).
# Extended by compose.dev.yml, compose.testnet-v2.yml, compose.testnet-v3.yml, etc.
#
# Usage:
#   docker compose -f docker/compose.base.yml -f docker/compose.dev.yml up -d

x-zephyr-node: &zephyr-node
  image: zephyr-devnet
  environment:
    ZEPHYR_MODE: node
    MONERO_RANDOMX_UMASK: "1"
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:${RPC_PORT:-47767}/json_rpc", "-d", '{"jsonrpc":"2.0","id":"0","method":"get_info"}']
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 10s
  restart: unless-stopped

x-zephyr-wallet: &zephyr-wallet
  image: zephyr-devnet
  environment:
    ZEPHYR_MODE: wallet
  restart: unless-stopped

services:
  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: zephyr-redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # PostgreSQL
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: zephyr-postgres
    environment:
      POSTGRES_USER: zephyr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zephyr
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zephyr"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Zephyr Node 1 (primary)
  # ===========================================
  zephyr-node1:
    <<: *zephyr-node
    container_name: zephyr-node1
    command:
      - "--devnet"
      - "--fixed-difficulty=1"
      - "--data-dir=/data"
      - "--p2p-bind-port=47766"
      - "--rpc-bind-port=47767"
      - "--zmq-rpc-bind-port=47768"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--add-exclusive-node=zephyr-node2:47866"
      - "--non-interactive"
      - "--log-level=1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:47767/json_rpc", "-d", '{"jsonrpc":"2.0","id":"0","method":"get_info"}']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - zephyr-node1-data:/data
    networks:
      - zephyr-net

  # ===========================================
  # Zephyr Node 2 (mining/secondary)
  # ===========================================
  zephyr-node2:
    <<: *zephyr-node
    container_name: zephyr-node2
    command:
      - "--devnet"
      - "--fixed-difficulty=1"
      - "--data-dir=/data"
      - "--p2p-bind-port=47866"
      - "--rpc-bind-port=47867"
      - "--zmq-rpc-bind-port=47868"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--add-exclusive-node=zephyr-node1:47766"
      - "--non-interactive"
      - "--log-level=1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:47867/json_rpc", "-d", '{"jsonrpc":"2.0","id":"0","method":"get_info"}']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - zephyr-node2-data:/data
    networks:
      - zephyr-net

  # ===========================================
  # Wallet RPCs
  # ===========================================
  wallet-gov:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-gov
    command:
      - "--devnet"
      - "--rpc-bind-port=48769"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
      - zephyr-checkpoint:/checkpoint
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48769/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  wallet-miner:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-miner
    command:
      - "--devnet"
      - "--rpc-bind-port=48767"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48767/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  wallet-test:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-test
    command:
      - "--devnet"
      - "--rpc-bind-port=48768"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48768/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  wallet-bridge:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-bridge
    command:
      - "--devnet"
      - "--rpc-bind-port=48770"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48770/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  wallet-engine:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-engine
    command:
      - "--devnet"
      - "--rpc-bind-port=48771"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48771/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  wallet-cex:
    <<: *zephyr-wallet
    container_name: zephyr-wallet-cex
    command:
      - "--devnet"
      - "--rpc-bind-port=48772"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - zephyr-wallets:/wallets
      - zephyr-shared:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48772/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  # ===========================================
  # Fake Oracle
  # ===========================================
  # Shares network namespace with zephyr-node1 so the daemon can reach
  # the oracle at 127.0.0.1:5555 (hardcoded in devnet config).
  # Node2 reaches it via zephyr-node1:5555 (same network namespace).
  fake-oracle:
    image: zephyr-fake-oracle
    container_name: zephyr-fake-oracle
    network_mode: "service:zephyr-node1"
    environment:
      ORACLE_PORT: "5555"
      GOV_WALLET_RPC: "http://wallet-gov:48769"
      NODE_RPC: "http://127.0.0.1:47767"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5555/status"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      zephyr-node1:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Fake Orderbook
  # ===========================================
  fake-orderbook:
    image: zephyr-fake-orderbook
    container_name: zephyr-fake-orderbook
    environment:
      FAKE_ORDERBOOK_PORT: "5556"
      FAKE_ORACLE_URL: "http://zephyr-node1:5555"
    depends_on:
      fake-oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/status"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - zephyr-net

volumes:
  redis-data:
    name: bridge-redis-data
  postgres-data:
    name: bridge-postgres-data
  zephyr-node1-data:
    name: zephyr-node1-data
    external: true
  zephyr-node2-data:
    name: zephyr-node2-data
    external: true
  zephyr-wallets:
    name: zephyr-wallets
    external: true
  zephyr-shared:
    name: zephyr-shared
    external: true
  zephyr-checkpoint:
    name: zephyr-checkpoint
    external: true

networks:
  zephyr-net:
    driver: bridge
