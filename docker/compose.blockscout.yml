# ===========================================
# Blockscout Block Explorer Overlay
# ===========================================
# Reusable overlay — all services under profiles: ["explorer"].
# Include in compose chain; won't start unless --profile explorer is used.
#
# Dev:        docker compose -f base -f bridge -f engine -f dev -f blockscout --profile explorer up -d
# Testnet V2: docker compose -f base -f bridge -f engine -f testnet-v2 -f blockscout --profile full --profile explorer up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================
  # Blockscout Postgres (separate from main)
  # ===========================================
  blockscout-db:
    image: postgres:17-alpine
    container_name: orch-blockscout-db
    profiles: ["explorer"]
    environment:
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
      POSTGRES_DB: blockscout
    volumes:
      - orch-blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Blockscout Backend (API + Indexer)
  # ===========================================
  blockscout-backend:
    image: ghcr.io/blockscout/blockscout:latest
    container_name: orch-blockscout-backend
    profiles: ["explorer"]
    depends_on:
      blockscout-db:
        condition: service_healthy
      anvil:
        condition: service_healthy
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@blockscout-db:5432/blockscout
      ETHEREUM_JSONRPC_HTTP_URL: http://anvil:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://anvil:8545
      ETHEREUM_JSONRPC_WS_URL: ws://anvil:8545
      ETHEREUM_JSONRPC_VARIANT: anvil
      NETWORK: "Zephyr Devnet"
      SUBNETWORK: "Zephyr Devnet"
      CHAIN_ID: "31337"
      COIN: "ETH"
      # Anvil uses --state + --preserve-historical-states so all historical
      # block queries (eth_getBalance, eth_getCode at old blocks) work.
      # Only disable pending tx fetcher (Anvil has no real mempool).
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      # Skip genesis block — Anvil doesn't store block 0 as a historical state,
      # so coin_balance_catchup queries at block 0 fail with BlockOutOfRangeError.
      FIRST_BLOCK: "1"
      EXCHANGE_RATES_MARKET_CAP_SOURCE: ""
      EXCHANGE_RATES_COINGECKO_COIN_ID: ""
      ACCOUNT_ENABLED: "false"
      API_V2_ENABLED: "true"
      IS_ACCOUNT_SMART_CONTRACT_VERIFICATION_ENABLED: "false"
      DISABLE_EXCHANGE_RATES: "true"
      BLOCKSCOUT_HOST: "0.0.0.0"
      PORT: "4000"
      SECRET_KEY_BASE: "56NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5ulH5MSS7TiqgQRMo"
      ECTO_USE_SSL: "false"
      MIX_ENV: "prod"
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Blockscout Frontend
  # ===========================================
  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: orch-blockscout-frontend
    profiles: ["explorer"]
    depends_on:
      - blockscout-backend
    environment:
      NEXT_PUBLIC_API_HOST: ${BLOCKSCOUT_API_HOST:-localhost:${BLOCKSCOUT_PORT:-4000}}
      NEXT_PUBLIC_API_PROTOCOL: ${BLOCKSCOUT_API_PROTOCOL:-http}
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_NETWORK_NAME: "Zephyr Devnet"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "ZephDev"
      NEXT_PUBLIC_NETWORK_ID: "31337"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "Ether"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "ETH"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_NETWORK_RPC_URL: ${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-127.0.0.1}:8545
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_APP_HOST: ${BLOCKSCOUT_API_HOST:-localhost:${BLOCKSCOUT_PORT:-4000}}
      NEXT_PUBLIC_APP_PROTOCOL: ${BLOCKSCOUT_API_PROTOCOL:-http}
      NEXT_PUBLIC_STATS_API_HOST: ""
      NEXT_PUBLIC_VISUALIZE_API_HOST: ""
      NEXT_PUBLIC_CONTRACT_INFO_API_HOST: ""
      NEXT_PUBLIC_ADMIN_SERVICE_API_HOST: ""
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Blockscout Proxy (nginx — merges API + frontend)
  # ===========================================
  blockscout-proxy:
    image: nginx:alpine
    container_name: orch-blockscout-proxy
    profiles: ["explorer"]
    depends_on:
      - blockscout-backend
      - blockscout-frontend
    ports:
      - "${BLOCKSCOUT_PORT:-4000}:80"
    volumes:
      - ${ORCH_DIR}/config/blockscout-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

volumes:
  orch-blockscout-db-data:
    name: orch-blockscout-db-data
