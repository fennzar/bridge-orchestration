# ===========================================
# Dev Overrides
# ===========================================
# Adds: Anvil, wallet-cex, fake-orderbook, port exposure, devnet-init overrides.
# Apps run natively via Overmind (Procfile.dev).
#
# Usage (always combined with Zephyr base + bridge + engine):
#   docker compose -f $ZEPHYR_BASE \
#     -f docker/compose.bridge.yml -f docker/compose.engine.yml \
#     -f docker/compose.dev.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================
  # Anvil - Local EVM chain
  # ===========================================
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: orch-anvil
    ports:
      - "127.0.0.1:8545:8545"
    entrypoint: anvil
    command:
      - --host
      - "0.0.0.0"
      - --chain-id
      - "${EVM_CHAIN_ID:-271337}"
      - --accounts
      - "20"
      - --balance
      - "10000"
      - --mnemonic
      - "${EVM_DEV_MNEMONIC:-test test test test test test test test test test test junk}"
      - --state
      - /state/state.json
      - --preserve-historical-states
    volumes:
      - ${ORCH_DIR}/snapshots/anvil:/state
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # CEX Wallet (dev/testnet only)
  # ===========================================
  wallet-cex:
    image: zephyr-devnet
    container_name: orch-wallet-cex
    ports:
      - "127.0.0.1:48772:48772"
    environment:
      ZEPHYR_MODE: wallet
    command:
      - "--devnet"
      - "--rpc-bind-port=48772"
      - "--rpc-bind-ip=0.0.0.0"
      - "--confirm-external-bind"
      - "--disable-rpc-login"
      - "--wallet-dir=/wallets"
      - "--daemon-address=zephyr-node1:47767"
      - "--trusted-daemon"
      - "--shared-ringdb-dir=/data/ringdb"
      - "--log-level=1"
    volumes:
      - wallet-data:/wallets
      - shared-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://127.0.0.1:48772/json_rpc",
             "-d", '{"jsonrpc":"2.0","id":"0","method":"get_version"}',
             "-H", "Content-Type: application/json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      zephyr-node1:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Fake Orderbook (dev/testnet only)
  # ===========================================
  fake-orderbook:
    image: zephyr-fake-orderbook
    container_name: orch-fake-orderbook
    ports:
      - "127.0.0.1:5556:5556"
    environment:
      FAKE_ORDERBOOK_PORT: "5556"
      FAKE_ORACLE_URL: "http://zephyr-node1:5555"
    depends_on:
      zephyr-fake-oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/status"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Zephyr Base Service Overrides (dev only)
  # ===========================================

  # Oracle: add GOV_WALLET_RPC + NODE_RPC env vars for devnet features
  zephyr-fake-oracle:
    environment:
      ORACLE_PORT: "5555"
      GOV_WALLET_RPC: "http://wallet-gov:48769"
      NODE_RPC: "http://127.0.0.1:47767"

  # devnet-init: add fake-oracle dependency (base only depends on nodes + wallets)
  devnet-init:
    depends_on:
      zephyr-fake-oracle:
        condition: service_healthy

  # ===========================================
  # Port Exposure (dev only)
  # ===========================================
  # Oracle shares node1's network namespace, so oracle port is exposed via node1
  zephyr-node1:
    ports:
      - "127.0.0.1:47767:47767"
      - "127.0.0.1:5555:5555"

  zephyr-node2:
    ports:
      - "127.0.0.1:47867:47867"

  wallet-gov:
    ports:
      - "127.0.0.1:48769:48769"

  wallet-miner:
    ports:
      - "127.0.0.1:48767:48767"

  wallet-test:
    ports:
      - "127.0.0.1:48768:48768"

  wallet-bridge:
    ports:
      - "127.0.0.1:48770:48770"

  wallet-engine:
    ports:
      - "127.0.0.1:48771:48771"

  redis:
    ports:
      - "127.0.0.1:6380:6379"

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  wallet-data:
    name: zephyr-wallets
  shared-data:
    name: zephyr-shared
