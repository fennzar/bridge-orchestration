# ===========================================
# Dev Overrides
# ===========================================
# Adds: Anvil, port exposure, devnet-init container.
# Apps run natively via Overmind (Procfile.dev).
#
# Usage:
#   docker compose -f docker/compose.base.yml -f docker/compose.dev.yml up -d
#   docker compose -f docker/compose.base.yml -f docker/compose.dev.yml --profile init up devnet-init

services:
  # ===========================================
  # Anvil - Local EVM chain
  # ===========================================
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: zephyr-anvil
    ports:
      - "8545:8545"
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
      - "--accounts"
      - "20"
      - "--balance"
      - "10000"
      - "--mnemonic"
      - "${EVM_DEV_MNEMONIC:-test test test test test test test test test test test junk}"
      - "--state"
      - "/data/anvil-state.json"
    volumes:
      - anvil-data:/data
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - zephyr-net

  # ===========================================
  # Port Exposure (dev only)
  # ===========================================
  redis:
    ports:
      - "6380:6379"

  postgres:
    ports:
      - "5432:5432"

  # Oracle shares node1's network namespace, so oracle port is exposed via node1
  zephyr-node1:
    ports:
      - "47767:47767"
      - "5555:5555"

  zephyr-node2:
    ports:
      - "47867:47867"

  wallet-gov:
    ports:
      - "48769:48769"

  wallet-miner:
    ports:
      - "48767:48767"

  wallet-test:
    ports:
      - "48768:48768"

  wallet-bridge:
    ports:
      - "48770:48770"

  wallet-engine:
    ports:
      - "48771:48771"

  wallet-cex:
    ports:
      - "48772:48772"

  fake-orderbook:
    ports:
      - "5556:5556"

  # ===========================================
  # DEVNET Init (profile: init)
  # ===========================================
  # Uses zephyr-cli devnet init — creates gov/miner/test wallets only.
  # Bridge/engine/cex wallets are created by dev-setup.sh (not here).
  devnet-init:
    image: zephyr-devnet-init
    container_name: zephyr-devnet-init
    profiles:
      - init
    environment:
      ORACLE_PRICE: "2.0"
      DEVNET_MODE: "${DEVNET_MODE:-custom}"
      TARGET_RR: "7.0"
      ZSD_MINT_LIMIT: "450000"
      CHECKPOINT_FILE: "/checkpoint/height"
      MINING_THREADS: "2"
      # Docker hostname overrides (consumed by zephyr-cli config.py env var layer)
      ZEPHYR_DAEMON_HOST: "zephyr-node1"
      ZEPHYR_DAEMON_PORT: "47767"
      ZEPHYR_ORACLE_HOST: "zephyr-node1"
      ZEPHYR_ORACLE_PORT: "5555"
      ZEPHYR_WALLET_GOV_HOST: "wallet-gov"
      ZEPHYR_WALLET_GOV_PORT: "48769"
      ZEPHYR_WALLET_MINER_HOST: "wallet-miner"
      ZEPHYR_WALLET_MINER_PORT: "48767"
      ZEPHYR_WALLET_TEST_HOST: "wallet-test"
      ZEPHYR_WALLET_TEST_PORT: "48768"
    volumes:
      - zephyr-checkpoint:/checkpoint
    depends_on:
      zephyr-node1:
        condition: service_healthy
      zephyr-node2:
        condition: service_healthy
      fake-oracle:
        condition: service_healthy
      wallet-gov:
        condition: service_healthy
      wallet-miner:
        condition: service_healthy
      wallet-test:
        condition: service_healthy
    networks:
      - zephyr-net

volumes:
  anvil-data:
    name: bridge-anvil-data
