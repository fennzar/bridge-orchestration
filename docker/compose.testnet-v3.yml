# ===========================================
# Testnet V3 Overrides (Sepolia)
# ===========================================
# Extends base with: app containers, Caddy TLS, profiles.
# No Anvil (uses Sepolia RPC). No port exposure for internal services.
#
# Usage:
#   docker compose -f docker/compose.base.yml -f docker/compose.testnet-v3.yml --profile full up -d
#
# Profiles:
#   bridge  - Bridge services only
#   engine  - Engine services only
#   full    - Everything

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================
  # App Containers
  # ===========================================
  bridge-web:
    image: zephyr-bridge-web
    container_name: zephyr-bridge-web
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet-v3
    environment:
      PORT: "7050"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

  bridge-api:
    image: zephyr-bridge-api
    container_name: zephyr-bridge-api
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet-v3
    environment:
      PORT: "7051"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

  bridge-watchers:
    image: zephyr-bridge-watchers
    container_name: zephyr-bridge-watchers
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet-v3
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zephyr-node1:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

  engine-web:
    image: zephyr-engine-web
    container_name: zephyr-engine-web
    profiles: ["engine", "full"]
    env_file: ../env/.env.testnet-v3
    environment:
      PORT: "7000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

  engine-watchers:
    image: zephyr-engine-watchers
    container_name: zephyr-engine-watchers
    profiles: ["engine", "full"]
    env_file: ../env/.env.testnet-v3
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fake-orderbook:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

  dashboard:
    image: zephyr-dashboard
    container_name: zephyr-dashboard
    profiles: ["full"]
    environment:
      PORT: "7100"
      ZEPHYR_CHAIN_MODE: "devnet"
    logging: *default-logging
    networks:
      - zephyr-net

  # ===========================================
  # Caddy (TLS reverse proxy)
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: zephyr-caddy
    profiles: ["bridge", "full"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile.testnet-v3:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging
    networks:
      - zephyr-net

  # ===========================================
  # DEVNET Init (profile: init)
  # ===========================================
  # Uses zephyr-cli devnet init — creates gov/miner/test wallets only.
  devnet-init:
    image: zephyr-devnet-init
    container_name: zephyr-devnet-init
    profiles:
      - init
    environment:
      ORACLE_PRICE: "2.0"
      DEVNET_MODE: "${DEVNET_MODE:-custom}"
      TARGET_RR: "7.0"
      ZSD_MINT_LIMIT: "450000"
      CHECKPOINT_FILE: "/checkpoint/height"
      MINING_THREADS: "2"
      # Docker hostname overrides (consumed by zephyr-cli config.py env var layer)
      ZEPHYR_DAEMON_HOST: "zephyr-node1"
      ZEPHYR_DAEMON_PORT: "47767"
      ZEPHYR_ORACLE_HOST: "zephyr-node1"
      ZEPHYR_ORACLE_PORT: "5555"
      ZEPHYR_WALLET_GOV_HOST: "wallet-gov"
      ZEPHYR_WALLET_GOV_PORT: "48769"
      ZEPHYR_WALLET_MINER_HOST: "wallet-miner"
      ZEPHYR_WALLET_MINER_PORT: "48767"
      ZEPHYR_WALLET_TEST_HOST: "wallet-test"
      ZEPHYR_WALLET_TEST_PORT: "48768"
    volumes:
      - zephyr-checkpoint:/checkpoint
    depends_on:
      zephyr-node1:
        condition: service_healthy
      zephyr-node2:
        condition: service_healthy
      fake-oracle:
        condition: service_healthy
      wallet-gov:
        condition: service_healthy
      wallet-miner:
        condition: service_healthy
      wallet-test:
        condition: service_healthy
    logging: *default-logging
    networks:
      - zephyr-net

volumes:
  caddy-data:
    name: bridge-v3-caddy-data
  caddy-config:
    name: bridge-v3-caddy-config
