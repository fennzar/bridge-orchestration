# ===========================================
# Testnet Overrides
# ===========================================
# Extends base with: app containers, Caddy TLS, profiles.
# No Anvil (uses Sepolia RPC). No port exposure for internal services.
#
# Usage:
#   docker compose -f docker/compose.base.yml -f docker/compose.testnet.yml --profile full up -d
#
# Profiles:
#   bridge  - Bridge services only
#   engine  - Engine services only
#   full    - Everything

services:
  # ===========================================
  # App Containers
  # ===========================================
  bridge-web:
    image: zephyr-bridge-web
    container_name: zephyr-bridge-web
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet
    environment:
      PORT: "7050"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - zephyr-net

  bridge-api:
    image: zephyr-bridge-api
    container_name: zephyr-bridge-api
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet
    environment:
      PORT: "7051"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - zephyr-net

  bridge-watchers:
    image: zephyr-bridge-watchers
    container_name: zephyr-bridge-watchers
    profiles: ["bridge", "full"]
    env_file: ../env/.env.testnet
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zephyr-node1:
        condition: service_healthy
    networks:
      - zephyr-net

  engine-web:
    image: zephyr-engine-web
    container_name: zephyr-engine-web
    profiles: ["engine", "full"]
    env_file: ../env/.env.testnet
    environment:
      PORT: "7000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - zephyr-net

  engine-watchers:
    image: zephyr-engine-watchers
    container_name: zephyr-engine-watchers
    profiles: ["engine", "full"]
    env_file: ../env/.env.testnet
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fake-orderbook:
        condition: service_healthy
    networks:
      - zephyr-net

  dashboard:
    image: zephyr-dashboard
    container_name: zephyr-dashboard
    profiles: ["full"]
    environment:
      PORT: "7100"
      ZEPHYR_CHAIN_MODE: "devnet"
    networks:
      - zephyr-net

  # ===========================================
  # Caddy (TLS reverse proxy)
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: zephyr-caddy
    profiles: ["bridge", "full"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile.testnet:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - zephyr-net

  # ===========================================
  # DEVNET Init (profile: init)
  # ===========================================
  devnet-init:
    image: zephyr-devnet-init
    container_name: zephyr-devnet-init
    profiles:
      - init
    environment:
      NODE1_RPC: "http://zephyr-node1:47767"
      NODE2_RPC: "http://zephyr-node2:47867"
      GOV_WALLET_RPC: "http://wallet-gov:48769"
      MINER_WALLET_RPC: "http://wallet-miner:48767"
      TEST_WALLET_RPC: "http://wallet-test:48768"
      BRIDGE_WALLET_RPC: "http://wallet-bridge:48770"
      ORACLE_URL: "http://fake-oracle:5555"
      CHECKPOINT_FILE: "/checkpoint/height"
    volumes:
      - zephyr-checkpoint:/checkpoint
    depends_on:
      zephyr-node1:
        condition: service_healthy
      zephyr-node2:
        condition: service_healthy
      fake-oracle:
        condition: service_healthy
    networks:
      - zephyr-net

volumes:
  caddy-data:
  caddy-config:
